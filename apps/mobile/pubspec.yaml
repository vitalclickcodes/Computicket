name: computicket_mobile
description: Computicket Nigeria buyer-facing mobile app.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  go_router: ^14.6.1
  shared_preferences: ^2.3.3
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  intl: ^0.19.0
  provider: ^6.1.2
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

# Run `dart run flutter_launcher_icons` after `flutter create .` to
# generate iOS/Android/web launcher icons from assets/icon.png.
flutter_launcher_icons:
  image_path: "assets/icon.png"
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#ffffff"
    theme_color: "#008751"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon.png"
