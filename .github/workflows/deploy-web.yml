name: Deploy web

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - apps/web/**
      - packages/**
      - pnpm-lock.yaml
      - package.json
      - .github/workflows/deploy-web.yml
  workflow_dispatch:

# Production deploys only run after CI passes (the existing ci.yml on
# the same commit). PR previews are handled by Vercel's native git
# integration — this workflow only fires for branches that are about
# to become live.
jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: build
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

  deploy:
    needs: [wait-for-ci]
    if: ${{ always() && (needs.wait-for-ci.result == 'success' || needs.wait-for-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        # Production for main, preview for everything else. Pulls the
        # project's env vars + framework settings from the project
        # we provisioned via the Vercel dashboard.
        run: |
          ENV=$([ "${{ github.ref }}" = "refs/heads/main" ] && echo "production" || echo "preview")
          echo "DEPLOY_ENV=$ENV" >> $GITHUB_ENV
          vercel pull --yes --environment=$ENV --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Build for Vercel
        run: |
          FLAG=$([ "$DEPLOY_ENV" = "production" ] && echo "--prod" || echo "")
          vercel build $FLAG --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Deploy prebuilt to Vercel
        id: deploy
        run: |
          FLAG=$([ "$DEPLOY_ENV" = "production" ] && echo "--prod" || echo "")
          URL=$(vercel deploy --prebuilt $FLAG --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to $URL"
        working-directory: apps/web
      - name: Comment deploy URL on the commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            const env = "${{ env.DEPLOY_ENV }}";
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `Web ${env} deploy: ${url}`,
            });
